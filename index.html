
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semáforo NYSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230c0c10'/><rect x='11' y='2' width='10' height='28' rx='5' fill='%231a1a24'/><circle cx='16' cy='8' r='4' fill='%2300ff88'/><circle cx='16' cy='16' r='4' fill='%23ffb840'/><circle cx='16' cy='24' r='4' fill='%23ff4070'/></svg>">
<style>
:root{
  --bg:#0c0c10;--s1:#13131a;--s2:#1a1a24;--s3:#222233;--border:#252538;
  --text:#f0f0f8;--text2:#9090b0;--text3:#454565;
  --green:#00ff88;--green-dim:rgba(0,255,136,0.10);--green-glow:rgba(0,255,136,0.25);--green-border:rgba(0,255,136,0.22);
  --amber:#ffb840;--amber-dim:rgba(255,184,64,0.10);--amber-border:rgba(255,184,64,0.25);
  --red:#ff4070;--red-dim:rgba(255,64,112,0.10);--red-border:rgba(255,64,112,0.25);
  --display:'Syne',sans-serif;--mono:'Fira Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--display);min-height:100vh;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 45% at 15% 5%,rgba(99,102,241,0.07) 0%,transparent 60%),radial-gradient(ellipse 55% 40% at 85% 85%,rgba(0,255,136,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;flex:1;max-width:860px;margin:0 auto;padding:32px 20px 0;width:100%}

/* HEADER */
.header{text-align:center;margin-bottom:40px}
.logo-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px}
.logo-lights{display:flex;gap:6px;align-items:center}
.ll{width:13px;height:13px;border-radius:50%}
.ll.g{background:var(--green);box-shadow:0 0 10px var(--green-glow)}
.ll.a{background:var(--amber)}
.ll.r{background:var(--red)}
.logo-name{font-size:clamp(26px,6vw,46px);font-weight:800;letter-spacing:-.03em;line-height:1}
.logo-name span{color:var(--green)}
.logo-tag{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.16em;text-transform:uppercase}

/* SEARCH — mobile-first */
.search-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:22px 20px 20px;margin-bottom:16px}
.search-label{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.search-row{display:flex;flex-direction:column;gap:10px}
@media(min-width:520px){.search-row{flex-direction:row}}
.search-input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:15px 18px;font-family:var(--mono);font-size:17px;font-weight:500;color:var(--text);outline:none;letter-spacing:.06em;text-transform:uppercase;transition:border-color .2s,box-shadow .2s}
.search-input::placeholder{color:var(--text3);text-transform:none;font-weight:400;font-size:14px;letter-spacing:.02em}
.search-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,255,136,.08)}
.search-btn{width:100%;background:var(--green);color:#0c0c10;border:none;border-radius:10px;padding:15px 24px;font-family:var(--display);font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap;flex-shrink:0}
@media(min-width:520px){.search-btn{width:auto}}
.search-btn:hover{opacity:.88}
.search-btn:active{transform:scale(.97)}
.search-btn:disabled{opacity:.3;cursor:not-allowed}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.chip{font-family:var(--mono);font-size:12px;color:var(--text2);background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;transition:all .15s;user-select:none}
.chip:hover{border-color:var(--green);color:var(--green)}

/* LOADING */
.loading{display:none;text-align:center;padding:60px 20px}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-family:var(--mono);font-size:13px;color:var(--text3)}

/* ERROR / CACHE */
.error-msg{display:none;background:var(--red-dim);border:1px solid var(--red-border);border-radius:10px;padding:14px 18px;font-family:var(--mono);font-size:14px;color:var(--red);margin-bottom:16px;line-height:1.6}
.cache-note{display:none;background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:12px;color:var(--text3);margin-bottom:12px}

/* REPORT */
.report{display:none;animation:up .4s ease}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Company header */
.co-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:22px 24px;margin-bottom:14px}
.co-eyebrow{font-family:var(--mono);font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.14em;margin-bottom:10px}
.co-name{font-size:clamp(22px,5vw,36px);font-weight:800;letter-spacing:-.02em;line-height:1.15}
.co-ticker{color:var(--green);font-size:65%}
.co-meta{font-family:var(--mono);font-size:12px;color:var(--text3);margin-top:6px}

/* Verdict */
.verdict-card{border-radius:16px;padding:24px 22px;margin-bottom:14px;border:1px solid;position:relative;overflow:hidden}
.verdict-card::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;border-radius:50%;opacity:.12;filter:blur(50px);pointer-events:none}
.verdict-card.ok{background:var(--green-dim);border-color:var(--green-border)}
.verdict-card.ok::before{background:var(--green)}
.verdict-card.warn{background:var(--amber-dim);border-color:var(--amber-border)}
.verdict-card.warn::before{background:var(--amber)}
.verdict-card.fail{background:var(--red-dim);border-color:var(--red-border)}
.verdict-card.fail::before{background:var(--red)}
.verdict-inner{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.verdict-score-wrap{text-align:center;min-width:76px}
.verdict-score{font-size:clamp(40px,9vw,58px);font-weight:800;line-height:1}
.verdict-card.ok .verdict-score{color:var(--green)}
.verdict-card.warn .verdict-score{color:var(--amber)}
.verdict-card.fail .verdict-score{color:var(--red)}
.verdict-of{font-family:var(--mono);font-size:10px;color:var(--text2);letter-spacing:.08em;margin-top:2px}
.verdict-info{flex:1;min-width:200px}
.verdict-eyebrow{font-family:var(--mono);font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.14em;margin-bottom:6px}
.verdict-title{font-size:clamp(19px,4vw,25px);font-weight:800;margin-bottom:8px;line-height:1.1}
.verdict-card.ok .verdict-title{color:var(--green)}
.verdict-card.warn .verdict-title{color:var(--amber)}
.verdict-card.fail .verdict-title{color:var(--red)}
.verdict-desc{font-size:15px;color:var(--text2);line-height:1.7;font-weight:400}

/* Source bar */
.source-bar{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px 16px;margin-bottom:22px;font-family:var(--mono);font-size:11px;color:var(--text3);display:flex;gap:14px;flex-wrap:wrap;line-height:1.6}
.source-bar strong{color:var(--text2)}

/* Section label */
.sec-label{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.18em;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* Indicator cards */
.ind-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
.ind-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}
.ind-card.ok{border-left:3px solid var(--green)}
.ind-card.warn{border-left:3px solid var(--amber)}
.ind-card.fail{border-left:3px solid var(--red)}
.ind-left{min-width:0}
.ind-name{font-size:17px;font-weight:700;margin-bottom:2px}
.ind-en{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:6px}
.ind-val{font-family:var(--mono);font-size:clamp(17px,4vw,21px);font-weight:600;margin-top:4px;word-break:break-word}
.ind-val.nd{color:var(--text3);font-size:13px;line-height:1.5}
.ind-val-note{font-family:var(--mono);font-size:10px;color:var(--amber);margin-top:2px}
.ind-source{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:5px;line-height:1.5}
.ind-right{text-align:right;flex-shrink:0}
.ind-param{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text2);margin-bottom:8px;white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;font-weight:600;padding:6px 11px;border-radius:8px;white-space:nowrap;border:1px solid}
.badge.ok{background:var(--green-dim);color:var(--green);border-color:var(--green-border)}
.badge.warn{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-border)}
.badge.fail{background:var(--red-dim);color:var(--red);border-color:var(--red-border)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

.fcf-note{font-family:var(--mono);font-size:11px;color:var(--text3);padding:4px 0 18px;opacity:.7}

/* Dividend card */
.div-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:22px;display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.div-icon{font-size:26px;flex-shrink:0}
.div-content{flex:1;min-width:180px}
.div-label{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px}
.div-val{font-size:26px;font-weight:800;color:var(--text);margin-bottom:4px}
.div-note{font-family:var(--mono);font-size:12px;color:var(--text2);line-height:1.6}

/* Verify grid */
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
@media(max-width:500px){.vgrid{grid-template-columns:1fr}}
.vcard{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.vcard-name{font-size:15px;font-weight:700;margin-bottom:6px}
.vcard a{font-family:var(--mono);font-size:11px;color:var(--green);text-decoration:none;display:block;margin-bottom:4px}
.vcard a:hover{text-decoration:underline}
.vcard span{font-family:var(--mono);font-size:10px;color:var(--text3);display:block;line-height:1.6}

/* Disclaimer */
.disclaimer{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:28px}
.disclaimer-title{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.16em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.disclaimer p{font-family:var(--mono);font-size:12px;color:var(--text3);line-height:1.85}
.disclaimer strong{color:var(--text2)}

/* Footer */
footer{position:relative;z-index:1;text-align:center;padding:24px 20px 32px;font-family:var(--mono);font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:32px}
footer span{color:var(--text2)}

/* Mobile responsive adjustments */
@media(max-width:600px){
  .verdict-inner{flex-direction:column;gap:12px;align-items:flex-start}
  .verdict-score-wrap{display:flex;align-items:baseline;gap:10px}
  .verdict-of{margin-top:0}
  .ind-card{grid-template-columns:1fr}
  .ind-right{text-align:left;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .ind-param{margin-bottom:0}
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo-row">
      <div class="logo-lights">
        <div class="ll g"></div>
        <div class="ll a"></div>
        <div class="ll r"></div>
      </div>
      <div class="logo-name">Semáforo <span>NYSE</span></div>
    </div>
    <div class="logo-tag">Filtro de Calidad Institucional · v12</div>
  </div>

  <div class="search-card">
    <div class="search-label">Símbolo de la acción (Ticker)</div>
    <div class="search-row">
      <input class="search-input" id="tickerInput" type="text"
        placeholder="ej: AAPL, MSFT, KO..." autocomplete="off" autocapitalize="characters"/>
      <button class="search-btn" id="btn" onclick="analyze()">Analizar</button>
    </div>
    <div class="chips">
      <span class="chip" onclick="go('AAPL')">AAPL</span>
      <span class="chip" onclick="go('BP')">BP</span>
      <span class="chip" onclick="go('B')">B · Barrick</span>
      <span class="chip" onclick="go('MSFT')">MSFT</span>
      <span class="chip" onclick="go('NVDA')">NVDA</span>
      <span class="chip" onclick="go('KO')">KO</span>
      <span class="chip" onclick="go('JNJ')">JNJ</span>
      <span class="chip" onclick="go('XOM')">XOM</span>
    </div>
  </div>

  <div class="error-msg" id="err"></div>
  <div class="cache-note" id="cacheNote"></div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loadTxt">Conectando con Finnhub...</p>
  </div>
  <div class="report" id="report"></div>

</div>

<footer>
  <span>© 2026 Carlos Traseira</span> · Todos los derechos reservados
</footer>

<script>
const FH='d72mft9r01qlfd9nph2gd72mft9r01qlfd9nph30';
const FH_BASE='https://finnhub.io/api/v1';
const CACHE_TTL=24*60*60*1000;

function go(t){document.getElementById('tickerInput').value=t;analyze();}
document.getElementById('tickerInput').addEventListener('keydown',e=>{if(e.key==='Enter')analyze();});

const msgs=['Conectando con Finnhub...','Extrayendo indicadores fundamentales...','Procesando datos...','Generando diagnóstico...'];
let mi;
function startLoad(){let i=0;document.getElementById('loadTxt').textContent=msgs[0];mi=setInterval(()=>{i=(i+1)%msgs.length;document.getElementById('loadTxt').textContent=msgs[i];},2200);}
function stopLoad(){clearInterval(mi);}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block';}

function cacheKey(t){return`snse_v12_${t}`;}
function getCache(t){try{const r=localStorage.getItem(cacheKey(t));if(!r)return null;const o=JSON.parse(r);if(Date.now()-o.ts>CACHE_TTL){localStorage.removeItem(cacheKey(t));return null;}return o;}catch(e){return null;}}
function setCache(t,d){try{localStorage.setItem(cacheKey(t),JSON.stringify({ts:Date.now(),data:d}));}catch(e){}}

function toFloat(v){if(v==null||v==='')return null;const n=parseFloat(v);return isNaN(n)||!isFinite(n)?null:n;}
function fmtPct(v){return v!=null?v.toFixed(2)+'%':null;}
function fmtX(v){return v!=null?v.toFixed(2)+'x':null;}
function fmtM(v){
  if(v==null)return null;
  const a=Math.abs(v),s=v<0?'− ':'+ ';
  if(a>=1e12)return s+(a/1e12).toFixed(2)+' T USD';
  if(a>=1e9)return s+(a/1e9).toFixed(2)+' B USD';
  if(a>=1e6)return s+(a/1e6).toFixed(2)+' M USD';
  return s+(a/1e3).toFixed(1)+' K USD';
}
function sanitizePE(v){
  if(v==null)return{val:null,distorted:false};
  if(v>500||v<0)return{val:null,distorted:true};
  return{val:v,distorted:false};
}

// Extrae FCF del endpoint /stock/financials (estado de flujo de caja estandarizado)
function extractFCFFromFinancials(finData){
  if(!finData||!finData.data||!finData.data.length)return null;
  for(const period of finData.data){
    // Finnhub puede usar distintos nombres según versión
    const cfo=toFloat(period['operatingCashFlow'])??toFloat(period['netCashProvidedByOperatingActivities']);
    const capex=toFloat(period['capitalExpenditures'])??toFloat(period['purchasesOfPropertyPlantAndEquipment']);
    if(cfo!=null){
      if(capex!=null){
        // CapEx puede venir positivo o negativo; normalizamos a positivo para restar
        const fcf=cfo-Math.abs(capex);
        return{fcf,period:period['period']||period['endDate']||''};
      }
      return{fcf:cfo,period:period['period']||''};
    }
  }
  return null;
}

function buildIndicators(data,ticker){
  const m=data.metrics;

  // 1. Precio / Ganancias
  const rawPE=toFloat(m['peBasicExclExtraTTM'])??toFloat(m['peTTM'])??toFloat(m['peNormalizedAnnual']);
  const{val:pe,distorted:peDistorted}=sanitizePE(rawPE);

  // 2. Rentabilidad sobre Patrimonio (ROE)
  const roe=toFloat(m['roeTTM']);

  // 3. Margen Neto
  const margin=toFloat(m['netProfitMarginTTM']);

  // 4. Deuda / Patrimonio — Finnhub entrega ratio puro; convertir a %
  const deRaw=toFloat(m['totalDebt/totalEquityQuarterly'])??toFloat(m['totalDebt/totalEquityAnnual']);
  const debtEq=deRaw!=null?deRaw*100:null;

  // 5. Flujo de Caja Libre — tres capas de fallback
  let fcf=null,fcfPeriod='',fcfMethod='';

  // Capa A: endpoint /stock/financials con estado de flujo de caja TTM
  if(data.financialsCF){
    const result=extractFCFFromFinancials(data.financialsCF);
    if(result){fcf=result.fcf;fcfPeriod=result.period;fcfMethod='Estados financieros — Flujo Operativo − CapEx';}
  }

  // Capa B: campos directos en /stock/metric
  if(fcf==null){
    const cfo=toFloat(m['cashFlowFromOperationsTTM']);
    const capex=toFloat(m['capexTTM']);
    if(cfo!=null&&capex!=null){
      fcf=cfo-Math.abs(capex);
      fcfMethod='Métricas TTM — Flujo Operativo − CapEx';
    }else if(cfo!=null){
      fcf=cfo;
      fcfMethod='Flujo Operativo TTM (CapEx no disponible en Finnhub)';
    }
  }

  const divYield=toFloat(m['dividendYieldIndicatedAnnual']);

  const inds=[
    {
      nameEs:'Precio / Ganancias',nameEn:'Trailing P/E — Price / Earnings (TTM)',
      display:peDistorted
        ?{text:'N/D',nd:true,note:'Dato distorsionado — impairment o pérdida puntual'}
        :{text:fmtX(pe)??'N/D',nd:pe==null},
      raw:pe,param:'< 25x',
      paramDesc:'S&P 500 histórico ~17x · Buffett compró Apple a 10-11x',
      s:peDistorted?'warn':(pe==null?'warn':(pe<=25?'ok':pe<=30?'warn':'fail')),
      yu:`https://finance.yahoo.com/quote/${ticker}/key-statistics/`,
      yw:'Statistics → Valuation Measures → Trailing P/E'
    },
    {
      nameEs:'Rentabilidad sobre Patrimonio',nameEn:'ROE — Return on Equity (TTM)',
      display:{text:fmtPct(roe)??'N/D',nd:roe==null},
      raw:roe,param:'> 15%',
      paramDesc:'Umbral Buffett (carta accionistas 1987) · Coca-Cola y J&J superan 25% histórico',
      s:roe==null?'warn':(roe>=15?'ok':roe>=12?'warn':'fail'),
      yu:`https://finance.yahoo.com/quote/${ticker}/key-statistics/`,
      yw:'Statistics → Management Effectiveness → Return on Equity (ttm)'
    },
    {
      nameEs:'Margen Neto',nameEn:'Net Profit Margin (TTM)',
      display:{text:fmtPct(margin)??'N/D',nd:margin==null},
      raw:margin,param:'> 10%',
      paramDesc:'Piso institucional · Buffett ideal >20% · el margen revela la ventaja competitiva',
      s:margin==null?'warn':(margin>=10?'ok':margin>=7?'warn':'fail'),
      yu:`https://finance.yahoo.com/quote/${ticker}/key-statistics/`,
      yw:'Statistics → Profitability → Profit Margin'
    },
    {
      nameEs:'Deuda / Patrimonio',nameEn:'Total Debt / Equity (mrq)',
      display:{text:debtEq!=null?debtEq.toFixed(1)+'%':'N/D',nd:debtEq==null},
      raw:debtEq,param:'< 100%',
      paramDesc:'Buffett ideal <50% · consensus institucional tope en 100%',
      s:debtEq==null?'warn':(debtEq<=100?'ok':debtEq<=120?'warn':'fail'),
      yu:`https://finance.yahoo.com/quote/${ticker}/key-statistics/`,
      yw:'Statistics → Balance Sheet → Total Debt/Equity (mrq)'
    },
    {
      nameEs:'Flujo de Caja Libre',nameEn:'Free Cash Flow (TTM)',
      display:{
        text:fcf!=null
          ?fmtM(fcf)+(fcfPeriod?` · ${fcfPeriod}`:'')
          :'N/D · No disponible en Finnhub para este ticker',
        nd:fcf==null
      },
      raw:fcf,param:'Positivo',
      paramDesc:'FCF = Flujo Operativo − CapEx · Buffett: "las ganancias se manipulan, el cash no"',
      fcfMethod,
      s:fcf==null?'warn':(fcf>0?'ok':'fail'),
      yu:`https://finance.yahoo.com/quote/${ticker}/financials/`,
      yw:'Financials → Cash Flow Statement → Free Cash Flow'
    }
  ];
  return{inds,divYield};
}

async function fhGet(ep){
  const sep=ep.includes('?')?'&':'?';
  const r=await fetch(`${FH_BASE}${ep}${sep}token=${FH}`);
  if(!r.ok)throw new Error(`Error HTTP ${r.status}`);
  return r.json();
}

async function analyze(){
  const raw=document.getElementById('tickerInput').value.trim().toUpperCase();
  if(!raw)return;
  const ticker=raw.split(/[\s,(]/)[0];
  document.getElementById('err').style.display='none';
  document.getElementById('cacheNote').style.display='none';
  document.getElementById('report').style.display='none';
  document.getElementById('btn').disabled=true;

  const cached=getCache(ticker);
  if(cached){
    const mins=Math.round((Date.now()-cached.ts)/60000);
    document.getElementById('cacheNote').textContent=`Datos en caché para ${ticker} — guardados hace ${mins} min. Se actualizan cada 24 h.`;
    document.getElementById('cacheNote').style.display='block';
    document.getElementById('btn').disabled=false;
    render(cached.data,ticker,true);return;
  }

  document.getElementById('loading').style.display='block';
  startLoad();
  try{
    const[profile,metrics,financialsCF]=await Promise.all([
      fhGet(`/stock/profile2?symbol=${ticker}`),
      fhGet(`/stock/metric?symbol=${ticker}&metric=all`),
      fhGet(`/stock/financials?symbol=${ticker}&statement=cf&freq=ttm`).catch(()=>null)
    ]);
    if(!profile||!profile.name)throw new Error(`No se encontró "${ticker}". Verificá que sea un ticker válido de NYSE o NASDAQ.`);
    const d={profile,metrics:metrics.metric||{},financialsCF};
    setCache(ticker,d);
    stopLoad();
    document.getElementById('loading').style.display='none';
    document.getElementById('btn').disabled=false;
    render(d,ticker,false);
  }catch(e){
    stopLoad();
    document.getElementById('loading').style.display='none';
    document.getElementById('btn').disabled=false;
    showErr(e.message||'Error al analizar. Verificá el ticker e intentá de nuevo.');
  }
}

function render(data,ticker,fromCache){
  const{inds,divYield}=buildIndicators(data,ticker);
  const pass=inds.filter(i=>i.s==='ok').length;
  const p=data.profile;
  const name=p.name||ticker;
  const fcfInd=inds.find(i=>i.nameEs==='Flujo de Caja Libre');

  let vClass,vTitle;
  if(pass>=4){vClass='ok';vTitle=pass===5?'APTO — A+':'APTO — A';}
  else if(pass===3){vClass='warn';vTitle='CONDICIONAL';}
  else{vClass='fail';vTitle='NO APTO';}

  const failing=inds.filter(i=>i.s==='fail').map(i=>i.nameEs);
  const warning=inds.filter(i=>i.s==='warn').map(i=>i.nameEs);
  let desc='';
  if(pass===5)desc=`${name} supera los 5 parámetros institucionales. Negocio con ventaja competitiva demostrable, apto para la estrategia de cashflow con opciones.`;
  else if(pass===4)desc=`${name} cumple 4 de 5 parámetros. Punto a vigilar: ${warning[0]||failing[0]||'—'}. Apto con gestión estándar.`;
  else if(pass===3)desc=`Resultado mixto. ${failing.join(' y ')} no alcanzan los umbrales. Requiere análisis adicional y gestión de riesgo estricta.`;
  else desc=`${name} no cumple los parámetros mínimos (${failing.join(', ')}). No recomendable para la estrategia de cashflow en este momento.`;

  const cards=inds.map(i=>`
    <div class="ind-card ${i.s}">
      <div class="ind-left">
        <div class="ind-name">${i.nameEs}</div>
        <div class="ind-en">${i.nameEn}</div>
        <div class="ind-val${i.display.nd?' nd':''}">${i.display.text}</div>
        ${i.display.note?`<div class="ind-val-note">${i.display.note}</div>`:''}
        <div class="ind-source">${i.paramDesc}</div>
      </div>
      <div class="ind-right">
        <div class="ind-param">${i.param}</div>
        <span class="badge ${i.s}"><span class="dot"></span>${i.s==='ok'?'CUMPLE':i.s==='warn'?'LÍMITE':'NO CUMPLE'}</span>
      </div>
    </div>`).join('');

  const fcfNote=fcfInd?.fcfMethod?`<div class="fcf-note">⚙ Método: ${fcfInd.fcfMethod}</div>`:'';

  const dvNote=divYield==null?'Sin datos en Finnhub. Verificar en Yahoo Finance → Summary.'
    :divYield<1?'Bajo o nulo — habitual en acciones de alto crecimiento (NVDA, AMZN, GOOGL).'
    :divYield<=4?'Rango saludable (1–4%). Típico en blue chips de calidad sostenida.'
    :divYield<=6?'Rendimiento elevado. Verificar que el payout ratio sea sostenible (< 70%).'
    :'Rendimiento muy alto — puede anticipar recorte de dividendo. Revisar deuda y payout ratio.';

  const divCard=`
    <div class="div-card">
      <div class="div-icon">💵</div>
      <div class="div-content">
        <div class="div-label">Rendimiento por Dividendo · dato informativo · no suma al semáforo</div>
        <div class="div-val">${divYield!=null?divYield.toFixed(2)+'%':'N/D'}</div>
        <div class="div-note">${dvNote}</div>
      </div>
    </div>`;

  const vcards=inds.map(i=>`
    <div class="vcard">
      <div class="vcard-name">${i.nameEs}</div>
      <a href="${i.yu}" target="_blank" rel="noopener">Verificar en Yahoo Finance ↗</a>
      <span>${i.yw}</span>
    </div>`).join('');

  const dateStr=new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});

  document.getElementById('report').innerHTML=`
    <div class="co-card">
      <div class="co-eyebrow">Reporte de calidad · ${dateStr}${fromCache?' · datos en caché':''}</div>
      <div class="co-name">${name} <span class="co-ticker">(${ticker})</span></div>
      <div class="co-meta">${p.exchange||''}${p.finnhubIndustry?' · '+p.finnhubIndustry:''}${p.country?' · '+p.country:''}</div>
    </div>

    <div class="verdict-card ${vClass}">
      <div class="verdict-inner">
        <div class="verdict-score-wrap">
          <div class="verdict-score">${pass}/5</div>
          <div class="verdict-of">indicadores</div>
        </div>
        <div class="verdict-info">
          <div class="verdict-eyebrow">Diagnóstico final</div>
          <div class="verdict-title">${vTitle}</div>
          <div class="verdict-desc">${desc}</div>
        </div>
      </div>
    </div>

    <div class="source-bar">
      📡 Datos: <strong>Finnhub API</strong> · Benchmarks: <strong>Buffett / AAII / GuruFocus</strong> · Verificación: <strong>Yahoo Finance</strong>
    </div>

    <div class="sec-label">5 Filtros de Calidad Institucional</div>
    <div class="ind-cards">${cards}</div>
    ${fcfNote}

    ${divCard}

    <div class="sec-label">Guía de Verificación en Yahoo Finance</div>
    <div class="vgrid">${vcards}</div>

    <div class="sec-label">Aviso Legal</div>
    <div class="disclaimer">
      <div class="disclaimer-title">Disclaimer — Aviso importante</div>
      <p>La información presentada en esta aplicación proviene de <strong>Finnhub API</strong>, fuente de datos financieros pública, y se utiliza exclusivamente con fines <strong>educativos e informativos</strong>. Los datos pueden contener demoras, errores u omisiones inherentes a la fuente original.<br><br>
      Este análisis <strong>no constituye una recomendación de compra, venta o tenencia</strong> de ningún instrumento financiero. No es asesoramiento de inversión personalizado ni debe ser interpretado como tal. Los indicadores aquí presentados son herramientas de análisis fundamental y no garantizan rendimientos futuros. El desempeño pasado no es garantía de resultados futuros.<br><br>
      Toda decisión de inversión debe ser tomada con la orientación de un asesor financiero habilitado, considerando el perfil de riesgo, el horizonte temporal y los objetivos personales de cada inversor.<br><br>
      <strong>Carlos Traseira</strong> no es responsable de ninguna decisión de inversión tomada con base en la información aquí presentada.</p>
    </div>
  `;

  document.getElementById('report').style.display='block';
  document.getElementById('report').scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
